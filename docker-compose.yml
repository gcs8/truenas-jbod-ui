services:
  enclosure-ui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: truenas-jbod-ui
    env_file:
      - .env
    environment:
      HISTORY_BACKEND_URL: http://enclosure-history:8001
      HISTORY_BACKEND_TIMEOUT: ${HISTORY_BACKEND_TIMEOUT:-10}
    ports:
      - "${APP_PORT:-8080}:8000"
    volumes:
      - ./config:/app/config
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config/ssh:/run/ssh:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=4)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  enclosure-history:
    profiles:
      - history
    build:
      context: .
      dockerfile: Dockerfile
    container_name: truenas-jbod-history
    command: ["uvicorn", "history_service.main:app", "--host", "0.0.0.0", "--port", "8001"]
    environment:
      HISTORY_SOURCE_BASE_URL: http://enclosure-ui:8000
      HISTORY_SQLITE_PATH: /app/history/history.db
      HISTORY_BACKUP_DIR: ${HISTORY_BACKUP_DIR:-/app/history/backups}
      HISTORY_BACKUP_RETENTION_COUNT: ${HISTORY_BACKUP_RETENTION_COUNT:-28}
      HISTORY_POLL_INTERVAL_SECONDS: ${HISTORY_POLL_INTERVAL_SECONDS:-300}
      HISTORY_FAST_INTERVAL_SECONDS: ${HISTORY_FAST_INTERVAL_SECONDS:-300}
      HISTORY_SLOW_INTERVAL_SECONDS: ${HISTORY_SLOW_INTERVAL_SECONDS:-21600}
      HISTORY_REQUEST_TIMEOUT_SECONDS: ${HISTORY_REQUEST_TIMEOUT_SECONDS:-20}
      HISTORY_SMART_BATCH_SIZE: ${HISTORY_SMART_BATCH_SIZE:-24}
      HISTORY_STARTUP_GRACE_SECONDS: ${HISTORY_STARTUP_GRACE_SECONDS:-20}
    ports:
      - "127.0.0.1:${HISTORY_PORT:-8081}:8001"
    volumes:
      - ./history:/app/history
    depends_on:
      enclosure-ui:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/healthz', timeout=4)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
