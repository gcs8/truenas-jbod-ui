#     # exposes a working SES path, `extra_hosts` lets the app fall through to
#     # the usable controller host for `sg_ses` identify and slot-state reads.

layout:
  slot_count: 60
  rows: 4
  columns: 15
  # UI labels remain 00-59 by default.
  slot_number_base: 0
  # TrueNAS enclosure APIs often use 1-based slot numbering.
  api_slot_number_base: 1

paths:
  mapping_file: /app/data/slot_mappings.json
  log_file: /app/logs/app.log
  # Optional custom profile file for the v0.4.0 profile system.
  profile_file: /app/config/profiles.yaml
