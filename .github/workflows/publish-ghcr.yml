name: Publish GHCR Image

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      image_tags:
        description: Comma-separated image tags to publish. Leave blank to use branch and sha tags.
        required: false
        type: string
      make_latest:
        description: Also publish the latest tag for this manual run.
        required: false
        default: false
        type: boolean
      platforms:
        description: Comma-separated target platforms.
        required: false
        default: linux/amd64
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: ghcr-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build and push container image
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/truenas-jbod-ui
      INPUT_TAGS: ${{ github.event_name == 'workflow_dispatch' && inputs.image_tags || '' }}
      INPUT_PLATFORMS: ${{ github.event_name == 'workflow_dispatch' && inputs.platforms || 'linux/amd64' }}
      INPUT_LATEST: ${{ github.event_name == 'workflow_dispatch' && inputs.make_latest || false }}
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve publish tags
        id: prep
        shell: bash
        run: |
          set -euo pipefail

          image="$IMAGE_NAME"
          declare -a tags=()
          version=""
          source_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}"

          if [ "${GITHUB_EVENT_NAME}" = "release" ]; then
            release_tag="${{ github.event.release.tag_name }}"
            version="${release_tag#v}"
            tags+=("$image:$release_tag")
            tags+=("$image:$version")
            tags+=("$image:latest")
          else
            if [ -n "$INPUT_TAGS" ]; then
              normalized="${INPUT_TAGS//,/ }"
              for tag in $normalized; do
                if [ -n "$tag" ]; then
                  tags+=("$image:$tag")
                fi
              done
            fi

            if [ ${#tags[@]} -eq 0 ]; then
              ref_tag="${GITHUB_REF_NAME//\//-}"
              tags+=("$image:$ref_tag")
              tags+=("$image:sha-${GITHUB_SHA::7}")
            fi

            if [ "$INPUT_LATEST" = "true" ]; then
              tags+=("$image:latest")
            fi

            if [ -f app/__init__.py ]; then
              version="$(python -c "from pathlib import Path; import re; text = Path('app/__init__.py').read_text(encoding='utf-8'); match = re.search(r'__version__\\s*=\\s*\\\"([^\\\"]+)\\\"', text); print(match.group(1) if match else '')")"
            fi
          fi

          declare -A seen=()
          declare -a unique_tags=()
          for tag in "${tags[@]}"; do
            if [ -n "$tag" ] && [ -z "${seen[$tag]+x}" ]; then
              unique_tags+=("$tag")
              seen[$tag]=1
            fi
          done

          if [ ${#unique_tags[@]} -eq 0 ]; then
            echo "No tags resolved."
            exit 1
          fi

          if [ -z "$version" ]; then
            version="${GITHUB_SHA::7}"
          fi

          {
            printf 'tags<<EOF\n'
            printf '%s\n' "${unique_tags[@]}"
            printf 'EOF\n'
            printf 'version=%s\n' "$version"
            printf 'source_url=%s\n' "$source_url"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: ${{ env.INPUT_PLATFORMS }}
          tags: ${{ steps.prep.outputs.tags }}
          labels: |
            org.opencontainers.image.title=TrueNAS JBOD Enclosure UI
            org.opencontainers.image.description=Off-box Docker UI for visualizing TrueNAS and appliance-attached chassis disks
            org.opencontainers.image.source=${{ steps.prep.outputs.source_url }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.prep.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
